name: CI

on:
  push:
    branches: [main, rm]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -project V2rayU.xcodeproj \
            -scheme V2rayUTests \
            -sdk macosx \
            -destination 'platform=macOS' \
            build

      - name: Test
        run: |
          xcodebuild test \
            -project V2rayU.xcodeproj \
            -scheme V2rayUTests \
            -sdk macosx \
            -destination 'platform=macOS'

      - name: Show test results
        if: always()
        run: |
          find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.xcresult" -type d | head -5
